name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GOOGLE_CALENDAR_API_KEY: ${{ secrets.VITE_GOOGLE_CALENDAR_API_KEY }}
          VITE_GOOGLE_CALENDAR_ID_CAREER: ${{ secrets.VITE_GOOGLE_CALENDAR_ID_CAREER }}
          VITE_GOOGLE_CALENDAR_ID_COMMUNITY_CULTURE: ${{ secrets.VITE_GOOGLE_CALENDAR_ID_COMMUNITY_CULTURE }}
          VITE_GOOGLE_CALENDAR_ID_COLLABORATIONS: ${{ secrets.VITE_GOOGLE_CALENDAR_ID_COLLABORATIONS }}
          VITE_GOOGLE_CALENDAR_ID_EXTERNAL: ${{ secrets.VITE_GOOGLE_CALENDAR_ID_EXTERNAL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
